name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  Lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Run skillsaw
      uses: stbenjam/skillsaw@b7cb23b15447c510c73b38f6516e356d2a8a95e1 # v0
      with:
        strict: 'true'

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: Install Python dependencies
      run: uv pip install --system ruff

    - name: Run ruff check
      run: ruff check .

    - name: Run ruff format check
      run: ruff format --check --diff .

    - name: Run shellcheck
      run: find . -name '*.sh' -type f -exec shellcheck {} +

    - name: Reject "--" separator in uv run --script invocations
      run: |
        # uv passes a "--" after the script path straight into the script's
        # argv; flag-first scripts (e.g. jira_reader --issue) then fail with
        # "unrecognized arguments: --". Invoke as: uv run --script <path> <args>.
        if grep -rnE 'uv run --script [^[:space:]]+\.py +-- ' \
             --include='*.md' --include='*.py' \
             --exclude-dir=.git --exclude-dir=.venv .; then
          echo "::error::Remove the '--' separator after 'uv run --script <path>' (see lines above)."
          exit 1
        fi
